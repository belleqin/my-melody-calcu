<!DOCTYPE html>
<html>
<head>
    <title>My Melody Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Century Schoolbook";
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image: url("melodybg.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.calculator{
    background:rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:35px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

#display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    background:white;
    border-radius:25px;
    margin-bottom:15px;
    padding:20px;
    font-size:32px;
    text-align:right;
    color:#9a6b7b;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.08);
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:25px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background: #FFDDEA;
    color: #C95D89;
}

.operator{
    background: #CFAB8D;
    color: white;
}

.equal{
    background: #FFF1A8;
    color: #9B7B00;
}

.clear{
    background: #FFB7C9;
    color: white;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button class="operator" onclick="append('(')">(</button>
<button class="operator" onclick="append(')')">)</button>
<button class="operator" onclick="append('%')">%</button>
<button class="clear" onclick="clearDisplay()">AC</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="append('+')">+</button>

</div>
</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
